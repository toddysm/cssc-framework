# Reusable workflow: mirror a container image from an upstream registry into GHCR.
#
# This workflow is internal (note the leading underscore in the filename) and is
# not meant to be triggered directly. It is called by per-image "mirror-*"
# workflows via `uses:`.
#
# It orchestrates the shared composite actions under .github/actions/ to perform
# an idempotent sync: log in (registry-login), then compare the source and
# destination digests and copy only when they differ (mirror-image). crane copy
# preserves multi-architecture manifest lists; with copy_referrers it switches to
# an oras-based copy that also carries OCI referrers.
#
# Terminology and the action catalogue: see docs/reference/workflow-actions.md.
name: _reusable / mirror-image

on:
  workflow_call:
    inputs:
      source_image:
        description: "Fully qualified source image without tag (e.g. docker.io/library/python)."
        required: true
        type: string
      source_tag:
        description: "Source image tag to mirror (e.g. 3.14-slim)."
        required: true
        type: string
      dest_image:
        description: "Fully qualified destination image without tag (e.g. ghcr.io/toddysm/quarantine/python)."
        required: true
        type: string
      dest_tag:
        description: "Destination image tag (e.g. 3.14-slim)."
        required: true
        type: string
      force:
        description: "Copy even when the source and destination digests match."
        required: false
        default: false
        type: boolean
      source_login_registry:
        description: "Registry to authenticate to before pulling the source (e.g. dhi.io). Leave empty for anonymous public pulls."
        required: false
        default: ""
        type: string
      copy_referrers:
        description: "Also copy OCI referrer artifacts (SBOMs, provenance, VEX, signatures) attached to the image. Uses oras for the whole copy. Works for any image that has referrers."
        required: false
        default: false
        type: boolean
    secrets:
      source_registry_username:
        description: "Username for source_login_registry. Required only when source_login_registry is set."
        required: false
      source_registry_password:
        description: "Password/PAT for source_login_registry. Required only when source_login_registry is set."
        required: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out actions
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Set up oras
        # Only needed when copying referrers; the default crane-only path keeps
        # existing anonymous mirrors lightweight.
        if: ${{ inputs.copy_referrers }}
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.1

      - name: Log in to source registry
        # Only runs for authenticated sources (e.g. Docker Hardened Images on
        # dhi.io). Anonymous public sources leave source_login_registry empty
        # and skip this step entirely.
        if: ${{ inputs.source_login_registry != '' }}
        uses: ./.github/actions/registry-login
        with:
          registry: ${{ inputs.source_login_registry }}
          username: ${{ secrets.source_registry_username }}
          password: ${{ secrets.source_registry_password }}
          with-oras: ${{ inputs.copy_referrers }}

      - name: Log in to GHCR
        uses: ./.github/actions/registry-login
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
          with-oras: ${{ inputs.copy_referrers }}

      - name: Mirror image
        id: mirror
        uses: ./.github/actions/mirror-image
        with:
          source-image: ${{ inputs.source_image }}
          source-tag: ${{ inputs.source_tag }}
          dest-image: ${{ inputs.dest_image }}
          dest-tag: ${{ inputs.dest_tag }}
          force: ${{ inputs.force }}
          copy-referrers: ${{ inputs.copy_referrers }}

      - name: Write job summary
        env:
          SOURCE_REF: "${{ inputs.source_image }}:${{ inputs.source_tag }}"
          DEST_REF: "${{ inputs.dest_image }}:${{ inputs.dest_tag }}"
          COPIED: "${{ steps.mirror.outputs.copied }}"
          DIGEST: "${{ steps.mirror.outputs.digest }}"
          PREVIOUS_DIGEST: "${{ steps.mirror.outputs.previous-digest }}"
          REFERRERS_NOTE: "${{ steps.mirror.outputs.referrers-note }}"
        run: |
          set -euo pipefail
          if [ "${COPIED}" = "true" ]; then
            {
              echo "### Mirror image: copied :inbox_tray:"
              echo ""
              echo "- **Source:** \`${SOURCE_REF}\`"
              echo "- **Destination:** \`${DEST_REF}\`"
              echo "- **Previous digest:** \`${PREVIOUS_DIGEST}\`"
              echo "- **New digest:** \`${DIGEST}\`"
              if [ -n "${REFERRERS_NOTE}" ]; then echo "- **Referrers:** ${REFERRERS_NOTE}"; fi
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            {
              echo "### Mirror image: up to date :white_check_mark:"
              echo ""
              echo "- **Source:** \`${SOURCE_REF}\`"
              echo "- **Destination:** \`${DEST_REF}\`"
              echo "- **Digest:** \`${DIGEST}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi
