# TEMPORARY diagnostic workflow — DELETE before merge.
#
# Purpose: learn the real referrer / cosign-attestation layout of the DHI python
# image so the SBOM-based scan can be implemented against verified facts rather
# than assumptions. Triggered automatically on push to the feature branch.
name: _diag / dhi-discover

on:
  push:
    branches:
      - feature/dhi-referrers-sbom-scan
    paths:
      - .github/workflows/_diag-dhi-discover.yml

permissions:
  contents: read
  packages: read

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Set up crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Set up oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
        with:
          version: 1.3.1

      - name: Log in to dhi.io and GHCR
        env:
          DOCKERHUB_USERNAME: "${{ secrets.DOCKERHUB_USERNAME }}"
          DOCKERHUB_TOKEN: "${{ secrets.DOCKERHUB_TOKEN }}"
        run: |
          set -euo pipefail
          echo "${DOCKERHUB_TOKEN}" | crane auth login dhi.io --username "${DOCKERHUB_USERNAME}" --password-stdin
          echo "${DOCKERHUB_TOKEN}" | oras login dhi.io --username "${DOCKERHUB_USERNAME}" --password-stdin
          echo "${{ github.token }}" | crane auth login ghcr.io --username "${{ github.actor }}" --password-stdin
          echo "${{ github.token }}" | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Inspect DHI source structure
        env:
          SRC_IMG: dhi.io/python
          SRC_REF: dhi.io/python:3.14-alpine3.23
        run: |
          set -euo pipefail

          echo "=================================================================="
          echo "## Top-level manifest (index) of ${SRC_REF}"
          echo "=================================================================="
          crane manifest "${SRC_REF}" | jq '{mediaType, manifests: [.manifests[] | {mediaType, digest, platform, annotations}]}'

          echo "=================================================================="
          echo "## Index-level referrers (oras discover on the tag)"
          echo "=================================================================="
          oras discover --format json "${SRC_REF}" | jq '.' || echo "(no index-level referrers / discover failed)"

          echo "=================================================================="
          echo "## Per-platform manifests and their referrers"
          echo "=================================================================="
          child_digests="$(crane manifest "${SRC_REF}" | jq -r '.manifests[]?.digest // empty')"
          first_sbom_ref=""
          for d in ${child_digests}; do
            plat="$(crane manifest "${SRC_REF}" | jq -r --arg D "$d" '.manifests[] | select(.digest==$D) | "\(.platform.os)/\(.platform.architecture)\(if .platform.variant then "/"+.platform.variant else "" end) \(.annotations // {})"')"
            echo "------------------------------------------------------------------"
            echo "child ${d}  platform=${plat}"
            echo "------------------------------------------------------------------"
            disc="$(oras discover --format json "${SRC_IMG}@${d}" 2>/dev/null || echo '{}')"
            echo "${disc}" | jq '[.. | objects | select(has("artifactType")) | {artifactType, mediaType, digest, annotations}]' || true
            # remember the first referrer that looks like an SBOM
            if [ -z "${first_sbom_ref}" ]; then
              cand="$(echo "${disc}" | jq -r '[.. | objects | select(has("artifactType"))] | map(select(.artifactType | test("sbom|spdx|cyclonedx|in-toto";"i"))) | .[0].digest // empty' 2>/dev/null || true)"
              [ -n "${cand}" ] && first_sbom_ref="${SRC_IMG}@${cand}"
            fi
          done

          echo "=================================================================="
          echo "## First SBOM-like referrer detail: ${first_sbom_ref:-<none found>}"
          echo "=================================================================="
          if [ -n "${first_sbom_ref}" ]; then
            echo "### manifest:"
            oras manifest fetch "${first_sbom_ref}" | jq '.'
            echo "### layers (artifactType / mediaType / annotations):"
            oras manifest fetch "${first_sbom_ref}" | jq '.layers'
            # fetch the first layer blob and show its head to reveal DSSE/in-toto/predicateType
            blob_digest="$(oras manifest fetch "${first_sbom_ref}" | jq -r '.layers[0].digest')"
            blob_img="${first_sbom_ref%@*}"
            echo "### first layer blob (${blob_digest}) — head:"
            oras blob fetch --output - "${blob_img}@${blob_digest}" | head -c 4000 | jq '{_type, predicateType, payloadType, keys: (keys? // [])}' 2>/dev/null \
              || oras blob fetch --output - "${blob_img}@${blob_digest}" | head -c 2000
            echo ""
            echo "### attempt: decode DSSE payload -> in-toto predicateType"
            oras blob fetch --output - "${blob_img}@${blob_digest}" \
              | jq -r '.payload // empty' 2>/dev/null | base64 -d 2>/dev/null | jq '{_type, predicateType, subject}' 2>/dev/null \
              || echo "(not a DSSE envelope at layer[0], inspect raw output above)"
          fi
