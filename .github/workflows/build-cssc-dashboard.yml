# Build the CSSC Dashboard service images and publish them to GHCR.
#
# Each service image is built from apps/python-app (the build context that holds
# the shared libs/cssc_common library) and pushed to
# ghcr.io/toddysm/apps/cssc-dashboard/<service>, tagged with the short commit SHA
# and a moving `latest` tag.
#
# Images are OCI, multi-arch (linux/amd64 + linux/arm64), and carry OCI manifest
# annotations (standard org.opencontainers.image.* + custom com.toddysm.*) at
# both the index and per-platform manifest scope. `created` is derived from the
# commit time via SOURCE_DATE_EPOCH so builds are reproducible. An SPDX SBOM and
# a SLSA build-provenance attestation are generated per platform and attached to
# the image as OCI referrers.
#
# Naming convention: "build-<app>.yml" for build workflows, kept separate from
# "mirror-<image>.yml" and "promote-from-quarantine-<image>.yml". See
# docs/contributing/workflow-naming.md.
name: build / cssc-dashboard

on:
  push:
    branches: [main]
    paths:
      - "apps/python-app/services/**"
      - "apps/python-app/libs/**"
      - ".github/workflows/build-cssc-dashboard.yml"
  workflow_dispatch:

concurrency:
  group: build-cssc-dashboard
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  BASE_IMAGE: ghcr.io/toddysm/golden/python:3.14-slim

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - packages-service
          - issues-service
          - dashboard-web
    steps:
      - name: Check out
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Set up ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${ACTOR}" --password-stdin

      - name: Build and push ${{ matrix.service }}
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE: ghcr.io/toddysm/apps/cssc-dashboard/${{ matrix.service }}
          SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          set -euo pipefail

          short="${SHA:0:7}"

          # Reproducible timestamps: derive created from the commit time.
          SOURCE_DATE_EPOCH="$(git log -1 --pretty=%ct)"
          export SOURCE_DATE_EPOCH
          created="$(date -u -d "@${SOURCE_DATE_EPOCH}" +%Y-%m-%dT%H:%M:%SZ)"

          # Pin the base image by digest for provenance.
          base_name="${BASE_IMAGE%:*}"
          base_tag="${BASE_IMAGE##*:}"
          base_digest="$(docker buildx imagetools inspect "${BASE_IMAGE}" \
            --format '{{.Manifest.Digest}}')"
          # Pin the actual build to the base digest, not just annotate it, so
          # FROM resolves to the exact base image recorded in base.digest.
          base_ref="${base_name}@${base_digest}"

          case "${SERVICE}" in
            packages-service) desc="Lists GHCR container packages and their tags" ;;
            issues-service)   desc="Reads promotion tracking issues and blocking CVEs" ;;
            dashboard-web)    desc="CSSC Dashboard web UI and stage registry (BFF)" ;;
            *)                desc="CSSC Dashboard service" ;;
          esac

          # The annotation set (applied at both index and manifest scope below).
          anns=(
            "org.opencontainers.image.created=${created}"
            "org.opencontainers.image.source=${SERVER_URL}/${REPO}"
            "org.opencontainers.image.revision=${SHA}"
            "org.opencontainers.image.version=${short}"
            "org.opencontainers.image.title=CSSC Dashboard ${SERVICE}"
            "org.opencontainers.image.description=${desc}"
            "org.opencontainers.image.url=${SERVER_URL}/${REPO}"
            "org.opencontainers.image.documentation=${SERVER_URL}/${REPO}/blob/main/docs/architecture/apps/cssc-dashboard.md"
            "org.opencontainers.image.vendor=toddysm.com"
            "org.opencontainers.image.licenses=Apache-2.0"
            "org.opencontainers.image.base.name=${base_name}"
            "org.opencontainers.image.base.digest=${base_digest}"
            "com.toddysm.image.base.tag=${base_tag}"
            "com.toddysm.build.workflow=${WORKFLOW}"
            "com.toddysm.build.run-url=${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          )

          ann_args=()
          for a in "${anns[@]}"; do
            ann_args+=(--annotation "index:${a}" --annotation "manifest:${a}")
          done

          cd apps/python-app
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg BASE_IMAGE="${base_ref}" \
            --file "services/${SERVICE}/Dockerfile" \
            "${ann_args[@]}" \
            --tag "${IMAGE}:${short}" \
            --tag "${IMAGE}:latest" \
            --provenance=mode=max \
            --sbom=true \
            --output type=image,oci-mediatypes=true,push=true \
            .

          {
            echo "### ${SERVICE}"
            echo "- \`${IMAGE}:${short}\` (linux/amd64, linux/arm64)"
            echo "- base: \`${base_name}:${base_tag}@${base_digest}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Publish attestations as OCI 1.1 referrers for ${{ matrix.service }}
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE: ghcr.io/toddysm/apps/cssc-dashboard/${{ matrix.service }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          export LC_ALL=C

          short="${SHA:0:7}"
          ref="${IMAGE}:${short}"
          work="$(mktemp -d)"
          trap 'rm -rf "${work}"' EXIT

          # BuildKit embeds SBOM/provenance as attestation-manifests inside the
          # index (platform unknown/unknown, linked by vnd.docker.reference.*),
          # which the OCI Referrers API does not surface. Extract each
          # per-platform in-toto statement and re-attach it to the platform
          # manifest with `oras attach` so it becomes a true OCI 1.1 referrer,
          # discoverable via `oras discover` / the /v2/.../referrers endpoint.
          index="$(oras manifest fetch "${ref}")"

          # Attach the in-toto statement of one predicate type for one platform
          # as an OCI 1.1 referrer. No-op (with a warning) if it is not present.
          attach_referrer() {
            local pd="$1" pt="$2" title="$3" att_digest att layer_digest
            att_digest="$(printf '%s' "${index}" | jq -r --arg PD "${pd}" '
              .manifests[]
              | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest"
                       and .annotations["vnd.docker.reference.digest"] == $PD)
              | .digest // empty' | head -n1)"
            if [ -z "${att_digest}" ]; then
              echo "::warning::no attestation-manifest for ${pd}"
              return 0
            fi
            att="$(oras manifest fetch "${IMAGE}@${att_digest}")"
            layer_digest="$(printf '%s' "${att}" | jq -r --arg PT "${pt}" '
              .layers[]
              | select(.annotations["in-toto.io/predicate-type"] == $PT)
              | .digest // empty' | head -n1)"
            if [ -z "${layer_digest}" ]; then
              echo "::warning::no ${pt} attestation for ${pd}"
              return 0
            fi
            oras blob fetch --output "${work}/${title}" "${IMAGE}@${layer_digest}"
            oras attach \
              --artifact-type application/vnd.in-toto+json \
              --annotation "in-toto.io/predicate-type=${pt}" \
              --annotation "org.opencontainers.image.title=${title}" \
              "${IMAGE}@${pd}" \
              "${work}/${title}:application/vnd.in-toto+json"
            echo "attached ${pt} referrer to ${IMAGE}@${pd}"
          }

          # Real platform manifests only (skip the unknown/unknown attestations).
          platforms="$(printf '%s' "${index}" | jq -r '
            .manifests[]
            | select((.platform.os // "") != "" and (.platform.os // "") != "unknown")
            | .digest')"

          while IFS= read -r pd; do
            [ -n "${pd}" ] || continue
            attach_referrer "${pd}" "https://spdx.dev/Document" "sbom.spdx.json"
          done <<< "${platforms}"

          {
            echo "- SBOM: SPDX in-toto statement attached per platform as an OCI 1.1 referrer (\`application/vnd.in-toto+json\`)"
          } >> "${GITHUB_STEP_SUMMARY}"
