# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/apps/python-app/services/dashboard-web"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/apps/python-app/services/issues-service"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/apps/python-app/services/packages-service"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/apps/python-app/libs/cssc_common"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
  - package-ecosystem: "maven" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
  - package-ecosystem: "helm" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
